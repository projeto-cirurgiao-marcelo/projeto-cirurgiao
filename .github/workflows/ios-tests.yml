name: Mobile Tests

# Valida o app Expo canônico (mobile-app/) via Jest. Substituiu o antigo
# workflow nativo, que apontava para uma pasta inexistente e mascarava falhas.
# Sem EAS/credenciais/submit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Jest (mobile-app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test -- --runInBand
