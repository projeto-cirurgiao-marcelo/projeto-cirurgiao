name: Backend CI

# P1.3 (build/test gate) + P1.11 (secret scanning).
# Não configura deploy. Nenhum secret hardcoded aqui.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (backend-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api

    services:
      # pgvector, não postgres puro: a migration 20260418021654_add_pgvector_embeddings
      # faz `CREATE EXTENSION vector` e usa vector(768). pg15 = mesma major do dev.
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: projeto_cirurgiao
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Banco descartável do CI — credencial pública de throwaway, não é secret.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/projeto_cirurgiao
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-api/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed baseline data (xp rule / specialties)
        run: npm run db:seed:specialties

      - name: Test
        run: npm test -- --runInBand

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo: gitleaks varre todos os commits, não só o diff

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Token automático do runner (referência, não um valor commitado).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
